name: Build Release Packages

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: ChoppyAudioDetector-windows
            package_path: dist/ChoppyAudioDetector/ChoppyAudioDetector.exe
            archive_cmd: powershell -Command "Compress-Archive -Path dist/ChoppyAudioDetector/* -DestinationPath dist/ChoppyAudioDetector-windows.zip"
            upload_path: dist/ChoppyAudioDetector-windows.zip
          - os: macos-latest
            artifact_name: ChoppyAudioDetector-macos
            package_path: dist/ChoppyAudioDetector.app
            archive_cmd: zip -r dist/ChoppyAudioDetector-macos.zip dist/ChoppyAudioDetector.app
            upload_path: dist/ChoppyAudioDetector-macos.zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build package
        run: |
          pyinstaller --noconfirm --clean --windowed --name ChoppyAudioDetector --hidden-import live_analysis app_gui.py

      - name: Verify build output
        shell: bash
        run: |
          if [ ! -e "${{ matrix.package_path }}" ]; then
            echo "Expected package not found: ${{ matrix.package_path }}"
            exit 1
          fi

      - name: Archive package
        run: ${{ matrix.archive_cmd }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.upload_path }}

      - name: Upload asset to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.upload_path }}
